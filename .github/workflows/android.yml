name: Android CI

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      - name: Verify Gradle
        uses: gradle/actions/wrapper-validation@39fdf500b386709a9a4a769f717dad447ac345b9 # v6
      - name: Run unit tests and assemble debug APK
        run: ./gradlew --no-daemon --stacktrace test assembleStandardDebug
      - name: Upload APK
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: app-debug
          path: app/build/outputs/apk/standard/debug/app-standard-debug.apk
