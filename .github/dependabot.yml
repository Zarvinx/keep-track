version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 4
    groups:
      room:
        patterns:
          - "androidx.room:*"
      kotlin:
        patterns:
          - "org.jetbrains.kotlin:*"
          - "org.jetbrains.kotlinx:*"
      android-gradle-plugin:
        patterns:
          - "com.android.tools.build:gradle"
    ignore:
      - dependency-name: "org.jetbrains.kotlin:kotlin-gradle-plugin"
        update-types:
          - "version-update:semver-major"
    labels:
      - "dependencies"
      - "security"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:15"
      timezone: "UTC"
    open-pull-requests-limit: 4
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - "dependencies"
